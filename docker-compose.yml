version: "3.9"

# Shared environment blocks
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    _PIP_ADDITIONAL_REQUIREMENTS: "scikit-learn==1.5.0 pandas==2.2.2 mlflow==2.13.2 numpy==1.26.4"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/project/scripts
    - ./data:/opt/airflow/project/data
    - ./app:/opt/airflow/project/app
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - mlops

services:
  # ── Postgres (Airflow metadata DB) ─────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - mlops

  # ── Airflow init (one-shot DB migration + admin user creation) ─────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin
          --email admin@example.com || true
      "
    restart: "no"

  # ── Airflow webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow==2.13.2 --quiet &&
               mlflow server
                 --host 0.0.0.0
                 --port 5000
                 --backend-store-uri /mlflow/runs
                 --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 15s
      retries: 5
    networks:
      - mlops

  # ── FastAPI prediction service ─────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app/model:/app/app/model   # live model reload without rebuild
    environment:
      MODEL_PATH: app/model/model.pkl
    networks:
      - mlops
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 15s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mlops

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./monitoring/dashboard.json:/var/lib/grafana/dashboards/churn.json:ro
    networks:
      - mlops
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mlflow_data:
  airflow_logs:
  prometheus_data:
  grafana_data:

networks:
  mlops:
    driver: bridge
